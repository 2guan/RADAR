# ============================================================================
# 文件：docker-compose.yml
# 用途：RADAR 平台单服务部署编排。挂载数据库与附件目录到宿主机，保证持久化；
#       支持在 ARM 服务器上构建运行。
# 作者：hengguan
# ============================================================================

services:
  radar:
    build:
      context: .
      args:
        # 国内服务器如无法访问 Docker Hub，可通过 .env 覆盖为其他可用镜像源。
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:22-alpine}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        # 前端生产构建需要的 Node 堆内存上限；低内存服务器可在 .env 中调小或配合 swap 使用。
        WEB_BUILD_NODE_OPTIONS: ${WEB_BUILD_NODE_OPTIONS:---max-old-space-size=2048}
    image: ${RADAR_IMAGE:-radar:latest}
    container_name: ${RADAR_CONTAINER_NAME:-radar}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # 宿主机对外端口:容器内端口
      - "${RADAR_HTTP_PORT:-3510}:${PORT:-3000}"
    volumes:
      # 关键数据挂载到宿主机，容器删除后不丢失
      - ${RADAR_DATA_DIR:-./RADARdata/data}:/app/data
      - ${RADAR_ATTACHMENTS_DIR:-./RADARdata/attachments}:/app/attachments
