# ============================================================================
# 文件：docker-compose.yml
# 用途：RADAR 平台单服务部署编排。挂载数据库与附件目录到宿主机，保证持久化；
#       支持在 ARM 服务器上构建运行。
# 作者：hengguan
# ============================================================================

services:
  radar:
    build: .
    image: radar:latest
    container_name: radar
    restart: unless-stopped
    ports:
      # 宿主机对外端口:容器内端口（容器内仍为 3000）
      - "3510:3000"
    environment:
      # 生产环境务必修改 JWT 密钥与管理员密码
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiSm9obiIsImFkbWluIjp0cnVlfQ.efj_jdGYPHI7Z6ObaJQV9xdCb1__y841HeoNtUYKW3wnsy1wnuQCmC_ovRmjpuROjrzp1q70Coyidq5B48qK_A
      - ADMIN_PASSWORD=Admin@2026
    volumes:
      # 关键数据挂载到宿主机，容器删除后不丢失
      - ./RADARdata/data:/app/data
      - ./RADARdata/attachments:/app/attachments