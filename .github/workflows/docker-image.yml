name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 2guan/radar
  CN_REGISTRY: ${{ secrets.CN_REGISTRY }}
  CN_IMAGE_NAME: ${{ secrets.CN_IMAGE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            NODE_IMAGE=node:22-alpine
            NPM_CONFIG_REGISTRY=https://registry.npmjs.org/
            WEB_BUILD_NODE_OPTIONS=--max-old-space-size=2048
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Log in to China registry
        if: ${{ env.CN_REGISTRY != '' && env.CN_IMAGE_NAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CN_REGISTRY }}
          username: ${{ secrets.CN_REGISTRY_USERNAME }}
          password: ${{ secrets.CN_REGISTRY_PASSWORD }}

      - name: Build and push China registry image
        if: ${{ env.CN_REGISTRY != '' && env.CN_IMAGE_NAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            NODE_IMAGE=node:22-alpine
            NPM_CONFIG_REGISTRY=https://registry.npmjs.org/
            WEB_BUILD_NODE_OPTIONS=--max-old-space-size=2048
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.CN_REGISTRY }}/${{ env.CN_IMAGE_NAME }}:latest
            ${{ env.CN_REGISTRY }}/${{ env.CN_IMAGE_NAME }}:${{ github.sha }}
